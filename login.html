<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIS Portal - Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">

  <main class="login-card">
    <h1 class="brand">SIS Portal</h1>
    <p class="subtitle">Login to your account</p>

    <form action="home.html" method="get">
      <div class="form-group">
        <label for="studentid">Student ID or Email</label>
        <input type="text" id="studentid" name="studentid" class="form-control"
               placeholder="Enter your Student ID or Email" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Enter your password" autocomplete="current-password" required />
          <button type="button" class="toggle-password" aria-label="Show password"
                  aria-controls="password" aria-pressed="false">👁️</button>
        </div>
      </div>

      <div class="options-row">
        <label class="remember">
          <input type="checkbox" name="remember" /> Remember Me
        </label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <p class="login-footer">
      Don't have an account? <a href="register.html">Register Now</a>
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
