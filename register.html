<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration - SIS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="register-wrapper">

    <div class="top-nav-buttons">
      <a href="home.html" class="btn btn-primary">Home</a>
      <a href="login.html" class="btn btn-danger">Logout</a>
    </div>

    <main class="register-card">
      <div class="reg-title">
        <h1>Student Registration</h1>
        <p>Create an account</p>
      </div>

      <form action="home.html" method="get">
        <div class="form-group">
          <input type="text" id="fullname" name="fullname" class="form-control"
                 placeholder="Full Name" required />
        </div>

        <div class="form-group">
          <input type="text" id="studentid" name="studentid" class="form-control"
                 placeholder="Student ID" required />
        </div>

        <div class="form-group">
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="Email Address" required />
        </div>

        <div class="form-group">
          <input type="text" id="faculty" name="faculty" class="form-control"
                 placeholder="Faculty" required />
        </div>

        <div class="form-group">
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Password" required />
        </div>

        <div class="form-group">
          <input type="password" id="confirm" name="confirm" class="form-control"
                 placeholder="Confirm Password" required />
        </div>

        <label class="terms">
          <input type="checkbox" name="terms" required />
          I agree to Terms and Conditions
        </label>

        <div class="bottom-buttons">
          <a href="home.html" class="btn btn-danger">Home</a>
          <button type="submit" class="btn btn-primary">Register</button>
        </div>
      </form>
    </main>

  </div>

</body>
</html>
