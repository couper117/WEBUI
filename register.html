<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration - SIS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-body">

  <div class="register-wrapper">

    <div class="top-nav-buttons">
      <a href="home.html" class="btn btn-outline">Back Home</a>
      <a href="login.html" class="btn btn-primary">Logout</a>
    </div>

    <main class="register-card">
      <h1>Student Registration – Create Your Account</h1>

      <form action="home.html" method="get">
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" class="form-control"
                   placeholder="Enter your full name" required />
          </div>

          <div class="form-group">
            <label for="studentid">Student ID</label>
            <input type="text" id="studentid" name="studentid" class="form-control"
                   placeholder="e.g. STU2026001" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label for="faculty">Faculty</label>
            <select id="faculty" name="faculty" class="form-control" required>
              <option value="" disabled selected>Select your faculty</option>
              <option>Science &amp; Technology</option>
              <option>Engineering</option>
              <option>Business</option>
              <option>Arts &amp; Humanities</option>
              <option>Medicine</option>
            </select>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Create a password" required />
          </div>

          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" class="form-control"
                   placeholder="Re-enter your password" required />
          </div>
        </div>

        <label class="terms">
          <input type="checkbox" name="terms" required />
          I agree to the Terms and Conditions.
        </label>

        <div class="bottom-buttons">
          <a href="home.html" class="btn btn-outline">Back Home</a>
          <button type="submit" class="btn btn-primary">Register</button>
        </div>
      </form>
    </main>

  </div>

</body>
</html>
